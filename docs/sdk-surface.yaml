document:
  name: TadoNetApi SDK Surface
  version: 1
  lastUpdated: 2026-04-04
  purpose: >-
    Companion reference for humans and AI agents. This is not an OpenAPI document for the
    upstream Tado REST API; it describes the public .NET SDK surface exposed by this repository.
  conventions:
    nullability:
      nullable: Method or model property may be null.
      nonNullable: Method or model property is expected to be present.
    collectionReturns: IReadOnlyList<T> unless otherwise stated.
    modelSources:
      domain: Public SDK return models under src/TadoNetApi.Domain/Entities.
      infrastructure: Auth flow DTOs under src/TadoNetApi.Infrastructure/Dtos/Auth.

services:
  application:
    - name: UserAppService
      interface: IUserService
      implementation: TadoUserService
      methods:
        - name: GetMeAsync
          kind: read
          parameters: []
          returns:
            type: User
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/User.cs
          summary: Returns the current authenticated user including homes and linked mobile devices.

    - name: HomeAppService
      interface: IHomeService
      implementation: TadoHomeService
      methods:
        - name: GetHomeAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: House
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/House.cs
          summary: Returns detailed home metadata, address/geolocation, and incident-detection state.

        - name: GetHomeStateAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: HomeState
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/HomeState.cs
          summary: Returns the current home presence state.

        - name: GetUsersAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: User
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/User.cs
          summary: Returns the users assigned to a home.

        - name: GetAirComfortAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: AirComfort
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/AirComfort.cs
          summary: Returns freshness and room comfort indicators for a home.

        - name: GetIncidentDetectionAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: IncidentDetection
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/IncidentDetection.cs
          summary: Returns whether incident detection is supported and enabled.

        - name: GetHeatingCircuitsAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: HeatingCircuit
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/HeatingCircuit.cs
          summary: Returns configured heating circuits for a home.

        - name: GetHeatingSystemAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: HeatingSystem
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/HeatingSystem.cs
          summary: Returns boiler and underfloor-heating configuration.

        - name: GetFlowTemperatureOptimisationAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: FlowTemperatureOptimisation
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/FlowTemperatureOptimisation.cs
          summary: Returns the boiler flow-temperature optimisation settings for a home.

        - name: SetHomePresenceAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: presence
              type: string
              expectedValues: [HOME, AWAY]
          returns:
            type: void
            nullable: false
          summary: Updates the home presence mode.

        - name: ResetHomePresenceAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: void
            nullable: false
          summary: Removes the manual presence lock and returns control to geo-tracking.

    - name: ZoneAppService
      interface: IZoneService
      implementation: TadoZoneService
      methods:
        - name: GetZonesAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: Zone
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Zone.cs
          summary: Returns all zones for a home.

        - name: GetZoneAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: Zone
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Zone.cs
          summary: Returns one zone definition.

        - name: GetZoneStateAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: State
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/State.cs
          summary: Returns the live operating state for a zone.

        - name: GetZoneSummaryAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Returns current setting and termination, or null when no overlay is active.

        - name: GetZoneCapabilitiesAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: Capability
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Capability.cs
          summary: Returns the capability descriptors supported by a zone.

        - name: GetZoneControlAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: ZoneControl
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneControl.cs
          summary: Returns zone control metadata including heating-circuit assignment and duties.

        - name: GetDefaultZoneOverlayAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: DefaultZoneOverlay
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/DefaultZoneOverlay.cs
          summary: Returns the default termination condition for device-created overlays.

        - name: GetEarlyStartAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: EarlyStart
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/EarlyStart.cs
          summary: Returns whether early start is enabled.

        - name: GetAwayConfigurationAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: AwayConfiguration
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/AwayConfiguration.cs
          summary: Returns the zone settings used when the home is in AWAY mode.

        - name: GetZoneDayReportAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: date
              type: DateOnly?
              required: false
              source: caller-provided
          returns:
            type: ZoneDayReport
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneDayReport.cs
          summary: Returns the typed day-report data for a zone, optionally for a specific date.

        - name: GetZoneTemperatureOffsetAsync
          kind: read
          parameters:
            - name: zone
              type: Zone
              source: caller-provided
          returns:
            type: Temperature
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Temperature.cs
          summary: Resolves the first associated device from a zone and returns its temperature offset.

        - name: CreateZoneAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneType
              type: string
            - name: deviceSerialNumbers
              type: IReadOnlyList<string>
              collection: true
            - name: force
              type: bool?
              required: false
          returns:
            type: void
            nullable: false
          summary: Creates a new zone and moves the specified devices into it.

        - name: DeleteZoneOverlayAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: bool
            nullable: false
          summary: Deletes the currently active manual overlay for a zone.

        - name: SetEarlyStartAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: enabled
              type: bool
          returns:
            type: bool
            nullable: false
          summary: Enables or disables early start for a zone.

        - name: SetHeatingTemperatureCelsiusAsync
          overload: until-next-manual-change
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: temperature
              type: double
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Sets a manual heating overlay and returns the resulting zone summary.

        - name: SetHeatingTemperatureFahrenheitAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: temperature
              type: double
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Sets a manual heating overlay in Fahrenheit and returns the resulting zone summary.

        - name: SetHotWaterTemperatureCelsiusAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: temperature
              type: double
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Sets a manual hot water overlay in Celsius and returns the resulting zone summary.

        - name: SetHotWaterTemperatureFahrenheitAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: temperature
              type: double
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Sets a manual hot water overlay in Fahrenheit and returns the resulting zone summary.

        - name: SwitchHeatingOffAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Switches heating off for a zone and returns the resulting zone summary.

        - name: SwitchHotWaterOffAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Switches hot water off for a zone and returns the resulting zone summary.

        - name: SetHeatingTemperatureCelsiusAsync
          overload: timed
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
            - name: temperature
              type: double
            - name: durationMode
              type: DurationModes
            - name: timer
              type: TimeSpan?
          returns:
            type: ZoneSummary
            nullable: true
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/ZoneSummary.cs
          summary: Sets a timed manual heating overlay and returns the resulting zone summary.

    - name: DeviceAppService
      interface: IDeviceService
      implementation: TadoDeviceService
      methods:
        - name: GetDevicesAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: Device
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Device.cs
          summary: Returns all devices for a home.

        - name: GetDeviceListAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: DeviceListEntry
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/DeviceListEntry.cs
          summary: Returns devices together with optional zone association.

        - name: GetDeviceAsync
          kind: read
          parameters:
            - name: deviceId
              type: string
              validation: non-empty
          returns:
            type: Device
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Device.cs
          summary: Returns one device by its Tado device identifier.

        - name: GetDeviceAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: deviceId
              type: int
              validation: positive-id
          returns:
            type: Device
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Device.cs
          summary: Legacy overload that returns one device by numeric identifier while routing through the device-scoped endpoint.

        - name: GetZoneTemperatureOffsetAsync
          kind: read
          parameters:
            - name: deviceId
              type: int
              validation: positive-id
          returns:
            type: Temperature
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Temperature.cs
          summary: Returns the temperature offset for a device.

        - name: GetMobileDevicesAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: MobileDevice.Item
            collection: true
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/MobileDevice/Item.cs
          summary: Returns all mobile devices registered to a home.

        - name: GetZoneMeasuringDeviceAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: zoneId
              type: int
              validation: positive-id
          returns:
            type: Device
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Device.cs
          summary: Returns the measuring device assigned to a zone.

        - name: GetMobileDeviceAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: mobileDeviceId
              type: int
              validation: positive-id
          returns:
            type: MobileDevice.Item
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/MobileDevice/Item.cs
          summary: Returns one mobile device registered to a home.

        - name: GetMobileDeviceSettingsAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: mobileDeviceId
              type: int
              validation: positive-id
          returns:
            type: MobileDevice.Settings
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/MobileDevice/Settings.cs
          summary: Returns settings for one mobile device.

        - name: DeleteMobileDeviceAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: mobileDeviceId
              type: int
              validation: positive-id
          returns:
            type: bool
            nullable: false
          summary: Deletes a specific mobile device from the home.

        - name: SetMobileDeviceSettingsAsync
          kind: command
          parameters:
            - name: homeId
              type: int
              validation: positive-id
            - name: mobileDeviceId
              type: int
              validation: positive-id
            - name: settings
              type: MobileDevice.Settings
              source: caller-provided
          returns:
            type: bool
            nullable: false
          summary: Updates the settings for a specific mobile device.

        - name: SetDeviceChildLockAsync
          overload: by-device-model
          kind: command
          parameters:
            - name: device
              type: Device
            - name: enableChildLock
              type: bool
          returns:
            type: bool
            nullable: false
          summary: Updates child-lock state using a device model.

        - name: SetDeviceChildLockAsync
          overload: by-device-id
          kind: command
          parameters:
            - name: deviceId
              type: string
            - name: enableChildLock
              type: bool
          returns:
            type: bool
            nullable: false
          summary: Updates child-lock state using a device identifier.

        - name: SayHiAsync
          kind: command
          parameters:
            - name: deviceId
              type: string
          returns:
            type: bool
            nullable: false
          summary: Triggers identify mode on a device.

        - name: SetZoneTemperatureOffsetCelsiusAsync
          kind: command
          parameters:
            - name: deviceId
              type: string
            - name: temperature
              type: double
          returns:
            type: bool
            nullable: false
          summary: Updates a device temperature offset in Celsius.

    - name: WeatherAppService
      interface: IWeatherService
      implementation: TadoWeatherService
      methods:
        - name: GetWeatherAsync
          kind: read
          parameters:
            - name: homeId
              type: int
              validation: positive-id
          returns:
            type: Weather
            nullable: false
            source: domain
            modelFile: src/TadoNetApi.Domain/Entities/Weather.cs
          summary: Returns current weather conditions for a home.

  auth:
    - name: TadoAuthService
      interface: ITadoAuthService
      implementation: TadoAuthService
      methods:
        - name: StartDeviceAuthorisationAsync
          kind: auth
          parameters: []
          returns:
            type: DeviceCodeResponse
            nullable: false
            source: infrastructure
            modelFile: src/TadoNetApi.Infrastructure/Dtos/Auth/DeviceCodeResponse.cs
          summary: Starts the OAuth device flow and returns verification details.

        - name: WaitForDeviceTokenAsync
          kind: auth
          parameters:
            - name: deviceCode
              type: string
            - name: intervalSeconds
              type: int
            - name: maxWaitSeconds
              type: int
          returns:
            type: TadoAuthResponse
            nullable: false
            source: infrastructure
            modelFile: src/TadoNetApi.Infrastructure/Dtos/Auth/TadoAuthResponse.cs
          summary: Polls until the device flow completes and returns the token payload.

        - name: GetAccessTokenAsync
          kind: auth
          parameters: []
          returns:
            type: string
            nullable: false
          summary: Returns a valid access token, refreshing it internally when required.

models:
  User:
    file: src/TadoNetApi.Domain/Entities/User.cs
    properties:
      - { name: Name, type: string?, role: display-name }
      - { name: Email, type: string?, role: email }
      - { name: Username, type: string?, role: login-name }
      - { name: Id, type: string?, role: user-id }
      - { name: Homes, type: Home[]?, role: related-homes }
      - { name: Locale, type: string?, role: locale }
      - { name: MobileDevices, type: MobileDevice.Item[]?, role: linked-mobile-devices }

  Home:
    file: src/TadoNetApi.Domain/Entities/Home.cs
    properties:
      - { name: Id, type: long?, role: home-id }
      - { name: Name, type: string?, role: home-name }

  House:
    file: src/TadoNetApi.Domain/Entities/House.cs
    properties:
      - { name: Id, type: long, role: home-id }
      - { name: Name, type: string, role: home-name }
      - { name: DateTimeZone, type: string, role: timezone }
      - { name: DateCreated, type: DateTime, role: created-at }
      - { name: TemperatureUnit, type: string, role: preferred-unit }
      - { name: InstallationCompleted, type: bool, role: setup-state }
      - { name: SimpleSmartScheduleEnabled, type: bool, role: schedule-capability }
      - { name: AwayRadiusInMeters, type: double, role: geofencing-radius }
      - { name: License, type: string, role: license }
      - { name: ChristmasModeEnabled, type: bool, role: seasonal-flag }
      - { name: IncidentDetection, type: IncidentDetection?, role: nested-detection-state }
      - { name: ContactDetails, type: ContactDetails, role: contact }
      - { name: Address, type: Address, role: address }
      - { name: Geolocation, type: Geolocation, role: coordinates }

  HomeState:
    file: src/TadoNetApi.Domain/Entities/HomeState.cs
    properties:
      - { name: Presence, type: string, role: current-presence }

  AirComfort:
    file: src/TadoNetApi.Domain/Entities/AirComfort.cs
    properties:
      - { name: Freshness, type: AirComfortFreshness?, role: overall-freshness }
      - { name: AcPoweredOn, type: bool?, role: ac-power }
      - { name: LastAcPowerOff, type: DateTime?, role: last-ac-off }
      - { name: Comfort, type: List<AirComfortComfort>?, role: per-room-comfort }

  AirComfortFreshness:
    file: src/TadoNetApi.Domain/Entities/AirComfort.cs
    properties:
      - { name: Value, type: string?, role: freshness-state }
      - { name: LastOpenWindow, type: DateTime?, role: last-open-window }

  AirComfortComfort:
    file: src/TadoNetApi.Domain/Entities/AirComfort.cs
    properties:
      - { name: RoomId, type: int?, role: room-id }
      - { name: TemperatureLevel, type: string?, role: temperature-band }
      - { name: HumidityLevel, type: string?, role: humidity-band }
      - { name: Coordinate, type: AirComfortCoordinate?, role: chart-position }

  AirComfortCoordinate:
    file: src/TadoNetApi.Domain/Entities/AirComfort.cs
    properties:
      - { name: Radial, type: double?, role: radial-axis }
      - { name: Angular, type: int?, role: angular-axis }

  IncidentDetection:
    file: src/TadoNetApi.Domain/Entities/IncidentDetection.cs
    properties:
      - { name: Enabled, type: bool?, role: feature-enabled }
      - { name: Supported, type: bool?, role: feature-supported }

  HeatingCircuit:
    file: src/TadoNetApi.Domain/Entities/HeatingCircuit.cs
    properties:
      - { name: Number, type: int?, role: circuit-number }
      - { name: DriverSerialNo, type: string?, role: controller-serial }
      - { name: DriverShortSerialNo, type: string?, role: controller-short-serial }

  HeatingSystem:
    file: src/TadoNetApi.Domain/Entities/HeatingSystem.cs
    properties:
      - { name: Boiler, type: Boiler?, role: boiler-config }
      - { name: UnderfloorHeating, type: UnderfloorHeating?, role: underfloor-config }

  FlowTemperatureOptimisation:
    file: src/TadoNetApi.Domain/Entities/FlowTemperatureOptimisation.cs
    properties:
      - { name: HasMultipleBoilerControlDevices, type: bool?, role: multi-controller-flag }
      - { name: MaxFlowTemperature, type: int?, role: max-flow-temperature }
      - { name: MaxFlowTemperatureConstraints, type: FlowTemperatureOptimisationConstraints?, role: constraints }
      - { name: AutoAdaptation, type: FlowTemperatureOptimisationAutoAdaptation?, role: auto-adaptation }
      - { name: OpenThermDeviceSerialNumber, type: string?, role: opentherm-device-serial }

  FlowTemperatureOptimisationConstraints:
    file: src/TadoNetApi.Domain/Entities/FlowTemperatureOptimisation.cs
    properties:
      - { name: Min, type: int?, role: min }
      - { name: Max, type: int?, role: max }

  FlowTemperatureOptimisationAutoAdaptation:
    file: src/TadoNetApi.Domain/Entities/FlowTemperatureOptimisation.cs
    properties:
      - { name: Enabled, type: bool?, role: enabled }
      - { name: MaxFlowTemperature, type: int?, role: max-flow-temperature }

  Boiler:
    file: src/TadoNetApi.Domain/Entities/HeatingSystem.cs
    properties:
      - { name: Present, type: bool?, role: present }
      - { name: Id, type: int?, role: boiler-id }
      - { name: Found, type: bool?, role: detected }

  UnderfloorHeating:
    file: src/TadoNetApi.Domain/Entities/HeatingSystem.cs
    properties:
      - { name: Present, type: bool?, role: present }

  Zone:
