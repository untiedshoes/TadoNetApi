name: TadoNetApi CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test Solution
    runs-on: windows-latest

    steps:
      # -----------------------
      # Checkout repository
      # -----------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------
      # Setup .NET SDK
      # -----------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      # -----------------------
      # Restore dependencies
      # -----------------------
      - name: Restore dependencies
        run: dotnet restore TadoNetApi.slnx

      # -----------------------
      # Build solution
      # -----------------------
      - name: Build solution
        run: dotnet build TadoNetApi.slnx --no-restore --configuration Debug

      # -----------------------
      # Run backend (unit) tests
      # -----------------------
      - name: Run unit tests
        run: dotnet test TadoNetApi.slnx --no-build --verbosity normal --filter "Category!=Integration"

      # -----------------------
      # Run integration tests (if secrets exist)
      # -----------------------
      - name: Run integration tests
        shell: bash
        env:
          TADO_USERNAME: ${{ secrets.TADO_USERNAME }}
          TADO_PASSWORD: ${{ secrets.TADO_PASSWORD }}
        run: |
          if [ -z "$TADO_USERNAME" ] || [ -z "$TADO_PASSWORD" ]; then
            echo "⚠️ Skipping integration tests – TADO credentials not set."
            exit 0
          fi
          dotnet test TadoNetApi.slnx --no-build --filter "Category=Integration" --verbosity normal