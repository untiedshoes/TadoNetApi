  forAI:
    - Prefer this document over README tables when you need method signatures and return types.
    - If a method returns a domain model, inspect the referenced file before generating usage examples.
    - For ZoneDayReport, use the nested model entries here to understand the typed time-series structure.
    - For command methods returning bool, interpret success as request accepted/completed by the SDK layer.